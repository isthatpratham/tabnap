<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Sleeping Tab - TabNap</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="sleep-page">
    <!-- Soft violet ambient glow behind the card -->
    <div class="ambient-glow"></div>

    <div class="sleep-container">
        <h1 class="logo-title">TabNap</h1>
        <p class="sleep-message">This tab is sleeping to save memory.</p>

        <div class="sleep-indicator">
            <span class="indicator-label">Sleeping</span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>

        <button id="wake-btn" class="wake-btn">Wake Tab</button>
    </div>

    <script src="sleep.js"></script>
</body>

</html>
